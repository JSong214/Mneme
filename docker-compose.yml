services:
  db:
    image: pgvector/pgvector:pg16
    container_name: project-memory-assistant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pma
      POSTGRES_PASSWORD: pma_password
      POSTGRES_DB: project_memory_assistant
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pma -d project_memory_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
